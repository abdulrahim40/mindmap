<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MindForge Drag | Mind Map dengan Drag & Drop</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAoGrXoXaxiUF6hekvwwodObkM8w242g4o",
            authDomain: "mindmap-e14b0.firebaseapp.com",
            projectId: "mindmap-e14b0",
            storageBucket: "mindmap-e14b0.firebasestorage.app",
            messagingSenderId: "617969260439",
            appId: "1:617969260439:web:50b6a5c0d7b539c7ecd6d2"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.mindmapsCollection = collection(db, "mindmaps");
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.getDoc = getDoc;
        window.serverTimestamp = serverTimestamp;
    </script>
    <!-- d3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:active { transform: scale(0.98); }
        .node-rect {
            fill: #ffffff;
            stroke: #64748b;
            stroke-width: 2.5;
            rx: 12;
            ry: 12;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
            transition: all 0.1s ease;
            cursor: grab;
        }
        .node-rect-active {
            stroke: #3b82f6;
            stroke-width: 3.5;
            filter: drop-shadow(0 0 10px rgba(59,130,246,0.4));
        }
        .node-rect-dragging {
            cursor: grabbing;
            opacity: 0.7;
        }
        .node-text {
            font-size: 14px;
            font-weight: 600;
            fill: #1e293b;
            dominant-baseline: middle;
            text-anchor: middle;
            user-select: none;
            pointer-events: none;
        }
        .link-line {
            stroke: #94a3b8;
            stroke-width: 2.5;
            fill: none;
        }
        .action-btn {
            cursor: pointer;
            transition: 0.1s ease;
        }
        .action-btn:active { transform: scale(0.85); }
        .mindmap-svg { background: #fefefe; border-radius: 28px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); touch-action: none; }
        .drag-ghost {
            fill: #cbd5e1;
            stroke: #3b82f6;
            stroke-width: 2;
            rx: 12;
            opacity: 0.8;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        @media (max-width: 640px) {
            .node-rect { stroke-width: 2; cursor: grab; }
            .node-text { font-size: 13px; }
        }
    </style>
</head>
<body class="antialiased touch-manipulation">
<div id="app" class="max-w-7xl mx-auto px-3 sm:px-6 py-4 md:py-8">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div class="flex items-center gap-2">
            <i class="fas fa-project-diagram text-2xl md:text-3xl text-indigo-600"></i>
            <h1 class="text-xl md:text-2xl font-bold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">MindForge Drag</h1>
        </div>
        <div class="flex gap-2">
            <button id="backToDashboardBtn" class="hidden bg-white/80 backdrop-blur-sm text-slate-700 font-medium py-2 px-3 rounded-xl shadow-sm border text-sm"><i class="fas fa-arrow-left"></i> Dashboard</button>
            <button id="logoutBtn" class="bg-white/80 text-red-600 font-medium py-2 px-4 rounded-xl shadow-sm border border-red-200 text-sm"><i class="fas fa-sign-out-alt"></i> Keluar</button>
        </div>
    </div>

    <div id="dashboardView">
        <div class="flex justify-between items-center mb-5 flex-wrap gap-2">
            <div>
                <h2 class="text-lg font-semibold text-slate-800"><i class="fas fa-th-large mr-2 text-indigo-500"></i> Peta Pikiran</h2>
                <p class="text-slate-500 text-xs">Tekan card untuk buka | Drag node untuk pindah (anak/saudara)</p>
            </div>
            <button id="addCardBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl shadow-md flex items-center gap-2 text-sm font-medium"><i class="fas fa-plus-circle"></i> Card Baru</button>
        </div>
        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div class="col-span-full text-center py-12 text-slate-400"><i class="fas fa-spinner fa-pulse"></i> Memuat...</div>
        </div>
    </div>

    <div id="mindmapView" class="hidden">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="bg-gradient-to-r from-indigo-50 to-white px-4 py-3 border-b flex flex-wrap justify-between items-center gap-2">
                <div class="flex items-center gap-2 flex-1 min-w-0">
                    <i class="fas fa-brain text-indigo-600"></i>
                    <input type="text" id="mindmapTitleInput" class="text-lg md:text-xl font-bold bg-transparent border-0 focus:ring-0 outline-none text-slate-800 flex-1 min-w-0 px-1" placeholder="Judul">
                    <button id="saveTitleBtn" class="text-indigo-600 text-sm px-2"><i class="fas fa-save"></i></button>
                </div>
                <div class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full whitespace-nowrap"><i class="fas fa-arrows-alt"></i> Drag node untuk memindah</div>
            </div>
            <div class="relative" style="height: 65vh; min-height: 500px;">
                <div id="mindmapCanvas" class="w-full h-full overflow-hidden bg-white">
                    <svg id="treeSvg" width="100%" height="100%" viewBox="0 0 1000 600" class="mindmap-svg" style="touch-action: pan-x pan-y;"></svg>
                </div>
            </div>
            <div class="bg-slate-50 px-4 py-2 text-xs text-slate-500 flex justify-between items-center border-t">
                <span><i class="fas fa-hand-pointer mr-1"></i> Klik node ➕ | Drag untuk memindah</span>
                <span><i class="fas fa-keyboard"></i> Tab (anak) | Enter (saudara)</span>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyAoGrXoXaxiUF6hekvwwodObkM8w242g4o",
        authDomain: "mindmap-e14b0.firebaseapp.com",
        projectId: "mindmap-e14b0",
        storageBucket: "mindmap-e14b0.firebasestorage.app",
        messagingSenderId: "617969260439",
        appId: "1:617969260439:web:50b6a5c0d7b539c7ecd6d2"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const mindmapsCollection = collection(db, "mindmaps");
    const PASSWORD = "12354";
    let loggedIn = sessionStorage.getItem("mindmap_auth") === "true";
    
    const dashboardView = document.getElementById("dashboardView");
    const mindmapView = document.getElementById("mindmapView");
    const backBtn = document.getElementById("backToDashboardBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const cardsContainer = document.getElementById("cardsContainer");
    const addCardBtn = document.getElementById("addCardBtn");
    const mindmapTitleInput = document.getElementById("mindmapTitleInput");
    const saveTitleBtn = document.getElementById("saveTitleBtn");
    
    let currentMindmapId = null;
    let currentTreeData = null;
    let selectedNodeId = null;
    let svgElement, mainG, zoomBehavior;
    let currentTransform = null;
    // variabel drag
    let dragEnabled = true;
    let dragSubject = null;
    let dragGhostGroup = null;
    
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function createDefaultTree(title = "Peta Pikiran Baru") {
        return { id: generateId(), text: title, children: [] };
    }
    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }
    
    function findNodeById(node, id) {
        if (node.id === id) return node;
        if (node.children) for (let child of node.children) { const found = findNodeById(child, id); if (found) return found; }
        return null;
    }
    
    function findParentNode(root, childId) {
        if (root.id === childId) return null;
        if (root.children) {
            for (let child of root.children) {
                if (child.id === childId) return root;
                const found = findParentNode(child, childId);
                if (found) return found;
            }
        }
        return null;
    }
    
    function removeNodeFromParent(nodeId) {
        const parent = findParentNode(currentTreeData, nodeId);
        if (!parent) return false;
        const index = parent.children.findIndex(ch => ch.id === nodeId);
        if (index !== -1) {
            parent.children.splice(index, 1);
            return true;
        }
        return false;
    }
    
    // Fungsi untuk memindahkan node sebagai anak dari targetNodeId
    function moveAsChild(draggedNodeId, targetNodeId) {
        if (draggedNodeId === targetNodeId) return false;
        // cek apakah target adalah keturunan dari dragged? (tidak boleh siklus)
        let isDescendant = false;
        function checkDescendant(node, ancestorId) {
            if (node.id === ancestorId) return true;
            if (node.children) for (let child of node.children) if (checkDescendant(child, ancestorId)) return true;
            return false;
        }
        if (checkDescendant(findNodeById(currentTreeData, targetNodeId), draggedNodeId)) return false;
        
        const draggedNode = findNodeById(currentTreeData, draggedNodeId);
        if (!draggedNode) return false;
        const targetNode = findNodeById(currentTreeData, targetNodeId);
        if (!targetNode) return false;
        
        // Hapus dari parent lama
        const removed = removeNodeFromParent(draggedNodeId);
        if (!removed && draggedNodeId !== currentTreeData.id) return false;
        
        // Jika dragged adalah root, tidak bisa dipindah
        if (draggedNodeId === currentTreeData.id) return false;
        
        if (!targetNode.children) targetNode.children = [];
        targetNode.children.push(draggedNode);
        return true;
    }
    
    // Memindahkan sebagai saudara (sejajar) dari targetNodeId, ditempatkan setelah targetNode
    function moveAsSibling(draggedNodeId, targetNodeId) {
        if (draggedNodeId === targetNodeId) return false;
        if (draggedNodeId === currentTreeData.id) return false;
        
        const draggedNode = findNodeById(currentTreeData, draggedNodeId);
        if (!draggedNode) return false;
        const targetNode = findNodeById(currentTreeData, targetNodeId);
        if (!targetNode) return false;
        
        // Cari parent dari target
        const targetParent = findParentNode(currentTreeData, targetNodeId);
        if (!targetParent) return false; // target adalah root? root tidak bisa punya saudara
        // Hapus dragged dari parent lamanya
        const removed = removeNodeFromParent(draggedNodeId);
        if (!removed) return false;
        
        // Sisipkan setelah targetNode di dalam parent yang sama
        const targetIndex = targetParent.children.findIndex(ch => ch.id === targetNodeId);
        if (targetIndex !== -1) {
            targetParent.children.splice(targetIndex + 1, 0, draggedNode);
        } else {
            targetParent.children.push(draggedNode);
        }
        return true;
    }
    
    // Operasi node lainnya (addChild, addSibling, edit, hapus otomatis)
    function addChild(nodeId) {
        const parent = findNodeById(currentTreeData, nodeId);
        if (!parent) return;
        const newNode = { id: generateId(), text: "Baru", children: [] };
        if (!parent.children) parent.children = [];
        parent.children.push(newNode);
        renderMindMap();
        saveToFirebase();
        selectedNodeId = newNode.id;
    }
    
    function addSibling(nodeId) {
        if (nodeId === currentTreeData.id) return;
        const parent = findParentNode(currentTreeData, nodeId);
        if (!parent) return;
        const newNode = { id: generateId(), text: "Baru", children: [] };
        const index = parent.children.findIndex(ch => ch.id === nodeId);
        if (index !== -1) parent.children.splice(index + 1, 0, newNode);
        else parent.children.push(newNode);
        renderMindMap();
        saveToFirebase();
        selectedNodeId = newNode.id;
    }
    
    async function editNodeText(nodeId) {
        const node = findNodeById(currentTreeData, nodeId);
        if (!node) return;
        const newText = prompt("Edit teks node:", node.text);
        if (newText !== null) {
            node.text = newText;
            renderMindMap();
            if (node.text.trim() === "" && nodeId !== currentTreeData.id) {
                removeNodeFromParent(nodeId);
                if (selectedNodeId === nodeId) selectedNodeId = currentTreeData.id;
                renderMindMap();
            }
            saveToFirebase();
        }
    }
    
    async function saveToFirebase() {
        if (!currentMindmapId || !currentTreeData) return;
        try {
            await updateDoc(doc(db, "mindmaps", currentMindmapId), {
                title: mindmapTitleInput.value.trim(),
                data: currentTreeData,
                updatedAt: serverTimestamp()
            });
        } catch(e) { console.warn(e); }
    }
    
    // D3 tree rendering dengan drag behavior
    function initMindmapSVG() {
        const container = document.getElementById("mindmapCanvas");
        const width = container.clientWidth || 1000;
        const height = container.clientHeight || 550;
        svgElement = d3.select("#treeSvg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("width", "100%")
            .attr("height", "100%");
        svgElement.selectAll("*").remove();
        mainG = svgElement.append("g");
        zoomBehavior = d3.zoom().scaleExtent([0.3, 2.5]).on("zoom", (event) => {
            currentTransform = event.transform;
            mainG.attr("transform", event.transform);
        });
        svgElement.call(zoomBehavior);
        svgElement.call(zoomBehavior.transform, d3.zoomIdentity.translate(80, 150).scale(0.8));
    }
    
    function getTextWidth(text) {
        const len = text.length;
        return Math.max(90, Math.min(200, len * 7.5 + 24));
    }
    
    function renderMindMap() {
        if (!svgElement || !mainG) initMindmapSVG();
        const container = document.getElementById("mindmapCanvas");
        const width = container.clientWidth || 1000;
        const height = container.clientHeight || 550;
        svgElement.attr("viewBox", `0 0 ${width} ${height}`);
        if (!currentTreeData) return;
        
        const root = d3.hierarchy(currentTreeData, d => d.children);
        const treeLayout = d3.tree().nodeSize([85, 230]).size([height - 110, width - 200]);
        const treeRoot = treeLayout(root);
        
        // Links
        const links = treeRoot.links();
        mainG.selectAll(".link-line").remove();
        mainG.selectAll(".link-line")
            .data(links)
            .enter()
            .append("path")
            .attr("class", "link-line")
            .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));
        
        // Nodes
        const nodes = mainG.selectAll(".node-group").data(treeRoot.descendants(), d => d.data.id);
        mainG.selectAll(".plus-buttons-group").remove();
        
        // Drag behavior
        const dragHandler = d3.drag()
            .on("start", function(event, d) {
                if (event.sourceEvent.target.closest('.action-btn')) return; // jangan ganggu tombol plus
                if (d.data.id === currentTreeData.id) return; // root tidak bisa drag
                dragSubject = d.data;
                // buat ghost
                dragGhostGroup = mainG.append("g")
                    .attr("class", "drag-ghost-group")
                    .attr("transform", `translate(${d.y},${d.x})`);
                dragGhostGroup.append("rect")
                    .attr("x", -getTextWidth(d.data.text)/2)
                    .attr("y", -24)
                    .attr("width", getTextWidth(d.data.text))
                    .attr("height", 48)
                    .attr("rx", 12)
                    .attr("class", "drag-ghost")
                    .attr("fill", "#e2e8f0")
                    .attr("stroke", "#3b82f6")
                    .attr("stroke-dasharray", "4");
                dragGhostGroup.append("text")
                    .attr("dy", 4)
                    .attr("text-anchor", "middle")
                    .attr("fill", "#475569")
                    .text(d.data.text.length > 20 ? d.data.text.slice(0,17)+"..." : d.data.text);
                d3.select(this).classed("node-rect-dragging", true);
            })
            .on("drag", function(event, d) {
                if (!dragGhostGroup) return;
                const newX = d.y + event.dx;
                const newY = d.x + event.dy;
                dragGhostGroup.attr("transform", `translate(${newX},${newY})`);
            })
            .on("end", function(event, d) {
                if (!dragGhostGroup) {
                    d3.select(this).classed("node-rect-dragging", false);
                    return;
                }
                // cari node terdekat (tanpa ghost)
                const ghostX = parseFloat(dragGhostGroup.attr("transform").split(",")[0].split("(")[1]);
                const ghostY = parseFloat(dragGhostGroup.attr("transform").split(",")[1].split(")")[0]);
                // cari node terdekat di treeRoot
                let closestNode = null;
                let minDist = Infinity;
                treeRoot.descendants().forEach(node => {
                    if (node.data.id === d.data.id) return;
                    const dx = node.y - ghostX;
                    const dy = node.x - ghostY;
                    const dist = Math.hypot(dx, dy);
                    if (dist < minDist && dist < 80) {
                        minDist = dist;
                        closestNode = node.data;
                    }
                });
                dragGhostGroup.remove();
                dragGhostGroup = null;
                d3.select(this).classed("node-rect-dragging", false);
                
                if (closestNode && closestNode.id !== d.data.id) {
                    const userChoice = confirm(`Pindahkan node "${d.data.text}"?\nOK = sebagai anak dari "${closestNode.text}"\nBatal = sebagai saudara sejajar`);
                    let success = false;
                    if (userChoice) {
                        success = moveAsChild(d.data.id, closestNode.id);
                        if (!success) alert("Gagal memindahkan sebagai anak (mungkin menyebabkan siklus)");
                    } else {
                        success = moveAsSibling(d.data.id, closestNode.id);
                        if (!success) alert("Gagal memindahkan sebagai saudara");
                    }
                    if (success) {
                        renderMindMap();
                        saveToFirebase();
                        selectedNodeId = d.data.id;
                    }
                }
            });
        
        const nodeGroups = mainG.selectAll(".node-group").data(treeRoot.descendants(), d => d.data.id);
        nodeGroups.exit().remove();
        
        const nodeEnter = nodeGroups.enter().append("g")
            .attr("class", "node-group")
            .attr("transform", d => `translate(${d.y},${d.x})`)
            .attr("data-id", d => d.data.id)
            .on("click", function(event, d) {
                event.stopPropagation();
                selectedNodeId = d.data.id;
                renderMindMap();
            })
            .on("dblclick", function(event, d) {
                event.stopPropagation();
                editNodeText(d.data.id);
            })
            .call(dragHandler);
        
        nodeEnter.each(function(d) {
            const group = d3.select(this);
            const rectW = getTextWidth(d.data.text);
            group.append("rect")
                .attr("x", -rectW/2)
                .attr("y", -24)
                .attr("width", rectW)
                .attr("height", 48)
                .attr("class", d.data.id === selectedNodeId ? "node-rect node-rect-active" : "node-rect")
                .attr("rx", 12);
            group.append("text")
                .attr("class", "node-text")
                .attr("dy", 4)
                .text(d.data.text.length > 28 ? d.data.text.slice(0,25)+"..." : d.data.text);
        });
        
        nodeGroups.select("rect")
            .attr("width", d => getTextWidth(d.data.text))
            .attr("height", 48)
            .attr("class", d => d.data.id === selectedNodeId ? "node-rect node-rect-active" : "node-rect");
        nodeGroups.select("text")
            .text(d => d.data.text.length > 28 ? d.data.text.slice(0,25)+"..." : d.data.text);
        nodeGroups.attr("transform", d => `translate(${d.y},${d.x})`);
        
        // Tombol plus untuk node terpilih
        if (selectedNodeId) {
            const selectedHierarchy = treeRoot.descendants().find(d => d.data.id === selectedNodeId);
            if (selectedHierarchy) {
                const nodeX = selectedHierarchy.y;
                const nodeY = selectedHierarchy.x;
                const rectW = getTextWidth(selectedHierarchy.data.text);
                const rectHalfW = rectW / 2;
                const plusGroup = mainG.append("g").attr("class", "plus-buttons-group");
                const rightBtnX = nodeX + rectHalfW + 18;
                const rightBtnY = nodeY;
                plusGroup.append("circle")
                    .attr("cx", rightBtnX)
                    .attr("cy", rightBtnY)
                    .attr("r", 18)
                    .attr("fill", "#10b981")
                    .attr("stroke", "#fff")
                    .attr("stroke-width", 2)
                    .attr("class", "action-btn")
                    .style("cursor", "pointer")
                    .on("click", (event) => { event.stopPropagation(); addChild(selectedNodeId); });
                plusGroup.append("text")
                    .attr("x", rightBtnX)
                    .attr("y", rightBtnY)
                    .attr("dy", "0.35em")
                    .attr("text-anchor", "middle")
                    .attr("fill", "white")
                    .attr("font-size", "16")
                    .attr("font-weight", "bold")
                    .style("pointer-events", "none")
                    .text("+");
                if (selectedNodeId !== currentTreeData.id) {
                    const bottomBtnX = nodeX;
                    const bottomBtnY = nodeY + 24 + 18;
                    plusGroup.append("circle")
                        .attr("cx", bottomBtnX)
                        .attr("cy", bottomBtnY)
                        .attr("r", 18)
                        .attr("fill", "#f59e0b")
                        .attr("stroke", "#fff")
                        .attr("class", "action-btn")
                        .on("click", (event) => { event.stopPropagation(); addSibling(selectedNodeId); });
                    plusGroup.append("text")
                        .attr("x", bottomBtnX)
                        .attr("y", bottomBtnY)
                        .attr("dy", "0.35em")
                        .attr("text-anchor", "middle")
                        .attr("fill", "white")
                        .attr("font-size", "16")
                        .attr("font-weight", "bold")
                        .style("pointer-events", "none")
                        .text("↧");
                }
            }
        }
        if (currentTransform && zoomBehavior) svgElement.call(zoomBehavior.transform, currentTransform);
    }
    
    // Keyboard Tab/Enter
    function onKeyDownGlobal(event) {
        if (mindmapView.classList.contains("hidden")) return;
        if (!selectedNodeId || !currentTreeData) return;
        if (event.key === "Tab") { event.preventDefault(); addChild(selectedNodeId); }
        else if (event.key === "Enter") { event.preventDefault(); addSibling(selectedNodeId); }
    }
    
    // Dashboard CRUD (sama seperti sebelumnya)
    async function loadDashboard() {
        dashboardView.classList.remove("hidden");
        mindmapView.classList.add("hidden");
        backBtn.classList.add("hidden");
        cardsContainer.innerHTML = `<div class="col-span-full text-center py-12"><i class="fas fa-spinner fa-pulse"></i> Memuat...</div>`;
        try {
            const snap = await getDocs(mindmapsCollection);
            const cards = [];
            snap.forEach(docSnap => cards.push({ id: docSnap.id, ...docSnap.data() }));
            if (cards.length === 0) {
                cardsContainer.innerHTML = `<div class="col-span-full text-center py-12 bg-white/40 rounded-2xl"><i class="fas fa-folder-open text-5xl text-slate-300 mb-2"></i><p class="text-slate-500">Belum ada mind map. Tekan tombol Card Baru</p></div>`;
                return;
            }
            renderCards(cards);
        } catch(err) { cardsContainer.innerHTML = `<div class="col-span-full text-center text-red-500">Gagal: ${err.message}</div>`; }
    }
    
    function renderCards(cards) {
        cardsContainer.innerHTML = "";
        cards.forEach(card => {
            const cardDiv = document.createElement("div");
            cardDiv.className = "bg-white rounded-2xl shadow-md border border-slate-200 card-hover cursor-pointer active:scale-95 transition-all";
            cardDiv.innerHTML = `
                <div class="p-4">
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-md text-slate-800 truncate">${escapeHtml(card.title || "Tanpa judul")}</h3>
                        <div class="flex gap-2" onclick="event.stopPropagation()">
                            <button class="edit-card-btn text-indigo-500 p-1" data-id="${card.id}" data-title="${escapeHtml(card.title || '')}"><i class="fas fa-pen"></i></button>
                            <button class="delete-card-btn text-red-500 p-1" data-id="${card.id}"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="text-xs text-slate-400 mt-2"><i class="fas fa-code-branch"></i> Drag node untuk memindah</div>
                </div>
            `;
            cardDiv.addEventListener("click", (e) => {
                if (e.target.closest('.edit-card-btn') || e.target.closest('.delete-card-btn')) return;
                openMindmap(card.id, card.title, card.data);
            });
            cardsContainer.appendChild(cardDiv);
            cardDiv.querySelector(".edit-card-btn").addEventListener("click", async (e) => {
                e.stopPropagation();
                const id = e.currentTarget.getAttribute("data-id");
                const oldTitle = e.currentTarget.getAttribute("data-title");
                const newTitle = prompt("Edit judul card:", oldTitle);
                if (newTitle && newTitle.trim()) {
                    await updateDoc(doc(db, "mindmaps", id), { title: newTitle.trim() });
                    loadDashboard();
                }
            });
            cardDiv.querySelector(".delete-card-btn").addEventListener("click", async (e) => {
                e.stopPropagation();
                if (confirm("Hapus mind map ini permanen?")) {
                    await deleteDoc(doc(db, "mindmaps", card.id));
                    loadDashboard();
                }
            });
        });
    }
    
    async function createNewCard() {
        let title = prompt("Judul mind map baru:", "Mind Map Baru");
        if (!title) title = "Mind Map Baru";
        const newTree = createDefaultTree(title);
        const docRef = await addDoc(mindmapsCollection, { title, data: newTree, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
        await openMindmap(docRef.id, title, newTree);
    }
    
    async function openMindmap(id, title, treeData) {
        currentMindmapId = id;
        let dataTree = treeData;
        if (!dataTree) {
            const docSnap = await getDoc(doc(db, "mindmaps", id));
            if (docSnap.exists()) { title = docSnap.data().title; dataTree = docSnap.data().data; }
            else { alert("Data tidak ditemukan"); return; }
        }
        if (!dataTree || !dataTree.id) dataTree = createDefaultTree(title);
        currentTreeData = JSON.parse(JSON.stringify(dataTree));
        mindmapTitleInput.value = title;
        selectedNodeId = currentTreeData.id;
        dashboardView.classList.add("hidden");
        mindmapView.classList.remove("hidden");
        backBtn.classList.remove("hidden");
        initMindmapSVG();
        renderMindMap();
    }
    
    async function updateMindmapTitle() {
        const newTitle = mindmapTitleInput.value.trim();
        if (newTitle && currentMindmapId) {
            await updateDoc(doc(db, "mindmaps", currentMindmapId), { title: newTitle });
            alert("Judul tersimpan!");
        } else if (!newTitle) alert("Judul tidak boleh kosong");
    }
    
    function backToDashboard() {
        dashboardView.classList.remove("hidden");
        mindmapView.classList.add("hidden");
        backBtn.classList.add("hidden");
        currentMindmapId = null; currentTreeData = null; selectedNodeId = null;
        loadDashboard();
    }
    function logout() { sessionStorage.removeItem("mindmap_auth"); location.reload(); }
    function checkAuth() {
        if (!loggedIn) {
            const pwd = prompt("🔐 Masukkan password:", "");
            if (pwd === PASSWORD) { sessionStorage.setItem("mindmap_auth", "true"); loggedIn = true; loadDashboard(); }
            else { alert("Password salah!"); document.body.innerHTML = "<div class='h-screen flex items-center justify-center'><div class='text-center p-6'><i class='fas fa-lock text-5xl text-red-400'></i><h2>Akses Ditolak</h2></div></div>"; }
        } else { loadDashboard(); }
    }
    
    window.addEventListener("keydown", onKeyDownGlobal);
    window.addEventListener("resize", () => { if (!mindmapView.classList.contains("hidden") && currentTreeData) { initMindmapSVG(); renderMindMap(); } });
    addCardBtn.addEventListener("click", createNewCard);
    backBtn.addEventListener("click", backToDashboard);
    logoutBtn.addEventListener("click", logout);
    saveTitleBtn.addEventListener("click", updateMindmapTitle);
    checkAuth();
</script>
</body>
</html>
