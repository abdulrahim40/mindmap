<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MindForge Touch | Mind Map dengan Tombol Plus</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAoGrXoXaxiUF6hekvwwodObkM8w242g4o",
            authDomain: "mindmap-e14b0.firebaseapp.com",
            projectId: "mindmap-e14b0",
            storageBucket: "mindmap-e14b0.firebasestorage.app",
            messagingSenderId: "617969260439",
            appId: "1:617969260439:web:50b6a5c0d7b539c7ecd6d2"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.mindmapsCollection = collection(db, "mindmaps");
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.getDoc = getDoc;
        window.serverTimestamp = serverTimestamp;
    </script>
    <!-- d3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%); min-height: 100vh; }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:active { transform: scale(0.98); }
        /* Node kotak */
        .node-rect {
            fill: #ffffff;
            stroke: #64748b;
            stroke-width: 2.5;
            rx: 12;
            ry: 12;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .node-rect-active {
            stroke: #3b82f6;
            stroke-width: 3.5;
            filter: drop-shadow(0 0 10px rgba(59,130,246,0.4));
        }
        .node-text {
            font-size: 14px;
            font-weight: 600;
            fill: #1e293b;
            dominant-baseline: middle;
            text-anchor: middle;
            user-select: none;
            pointer-events: none;
        }
        .link-line {
            stroke: #94a3b8;
            stroke-width: 2.5;
            fill: none;
        }
        .action-btn {
            cursor: pointer;
            transition: 0.1s ease;
        }
        .action-btn:active { transform: scale(0.85); }
        .btn-bg {
            fill: #3b82f6;
            stroke: white;
            stroke-width: 2;
        }
        .btn-icon {
            fill: white;
            font-size: 12px;
            font-weight: bold;
            dominant-baseline: central;
            text-anchor: middle;
            pointer-events: none;
        }
        @media (max-width: 640px) {
            .node-rect { stroke-width: 2; }
            .node-text { font-size: 13px; }
            .action-btn circle { r: 14; }
        }
        .mindmap-svg { background: #fefefe; border-radius: 28px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); touch-action: none; }
        /* scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body class="antialiased touch-manipulation">
<div id="app" class="max-w-7xl mx-auto px-3 sm:px-6 py-4 md:py-8">
    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div class="flex items-center gap-2">
            <i class="fas fa-project-diagram text-2xl md:text-3xl text-indigo-600"></i>
            <h1 class="text-xl md:text-2xl font-bold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">MindForge Touch</h1>
        </div>
        <div class="flex gap-2">
            <button id="backToDashboardBtn" class="hidden bg-white/80 backdrop-blur-sm text-slate-700 font-medium py-2 px-3 rounded-xl shadow-sm border text-sm"><i class="fas fa-arrow-left"></i> Dashboard</button>
            <button id="logoutBtn" class="bg-white/80 text-red-600 font-medium py-2 px-4 rounded-xl shadow-sm border border-red-200 text-sm"><i class="fas fa-sign-out-alt"></i> Keluar</button>
        </div>
    </div>

    <!-- DASHBOARD CARDS -->
    <div id="dashboardView">
        <div class="flex justify-between items-center mb-5 flex-wrap gap-2">
            <div>
                <h2 class="text-lg font-semibold text-slate-800"><i class="fas fa-th-large mr-2 text-indigo-500"></i> Peta Pikiran</h2>
                <p class="text-slate-500 text-xs">Tekan card untuk buka | Sentuh node → muncul tombol ➕</p>
            </div>
            <button id="addCardBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl shadow-md flex items-center gap-2 text-sm font-medium"><i class="fas fa-plus-circle"></i> Card Baru</button>
        </div>
        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div class="col-span-full text-center py-12 text-slate-400"><i class="fas fa-spinner fa-pulse"></i> Memuat...</div>
        </div>
    </div>

    <!-- MIND MAP VIEW dengan canvas + tombol interaksi -->
    <div id="mindmapView" class="hidden">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="bg-gradient-to-r from-indigo-50 to-white px-4 py-3 border-b flex flex-wrap justify-between items-center gap-2">
                <div class="flex items-center gap-2 flex-1 min-w-0">
                    <i class="fas fa-brain text-indigo-600"></i>
                    <input type="text" id="mindmapTitleInput" class="text-lg md:text-xl font-bold bg-transparent border-0 focus:ring-0 outline-none text-slate-800 flex-1 min-w-0 px-1" placeholder="Judul">
                    <button id="saveTitleBtn" class="text-indigo-600 text-sm px-2"><i class="fas fa-save"></i></button>
                </div>
                <div class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full whitespace-nowrap"><i class="fas fa-mobile-alt"></i> Sentuh node ➕ | Tab/Enter</div>
            </div>
            <div class="relative" style="height: 65vh; min-height: 500px;">
                <div id="mindmapCanvas" class="w-full h-full overflow-hidden bg-white">
                    <svg id="treeSvg" width="100%" height="100%" viewBox="0 0 1000 600" class="mindmap-svg" style="touch-action: pan-x pan-y;"></svg>
                </div>
            </div>
            <!-- Info panel kecil ramah sentuh -->
            <div class="bg-slate-50 px-4 py-2 text-xs text-slate-500 flex justify-between items-center border-t">
                <span><i class="fas fa-hand-pointer mr-1"></i> Klik node aktifkan tombol plus</span>
                <span><i class="fas fa-keyboard"></i> Tab (anak) | Enter (saudara)</span>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyAoGrXoXaxiUF6hekvwwodObkM8w242g4o",
        authDomain: "mindmap-e14b0.firebaseapp.com",
        projectId: "mindmap-e14b0",
        storageBucket: "mindmap-e14b0.firebasestorage.app",
        messagingSenderId: "617969260439",
        appId: "1:617969260439:web:50b6a5c0d7b539c7ecd6d2"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const mindmapsCollection = collection(db, "mindmaps");
    const PASSWORD = "12354";
    let loggedIn = sessionStorage.getItem("mindmap_auth") === "true";
    
    // DOM elements
    const dashboardView = document.getElementById("dashboardView");
    const mindmapView = document.getElementById("mindmapView");
    const backBtn = document.getElementById("backToDashboardBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const cardsContainer = document.getElementById("cardsContainer");
    const addCardBtn = document.getElementById("addCardBtn");
    const mindmapTitleInput = document.getElementById("mindmapTitleInput");
    const saveTitleBtn = document.getElementById("saveTitleBtn");
    
    // State
    let currentMindmapId = null;
    let currentTreeData = null;      // { id, text, children }
    let selectedNodeId = null;
    let svgElement, mainG, zoomBehavior;
    let currentTransform = null;
    
    // Helper functions
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function createDefaultTree(title = "Peta Pikiran Baru") {
        return { id: generateId(), text: title, children: [] };
    }
    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }
    
    function findNodeById(node, id) {
        if (node.id === id) return node;
        if (node.children) for (let child of node.children) { const found = findNodeById(child, id); if (found) return found; }
        return null;
    }
    
    // Auto hapus node jika teks kosong (kecuali root)
    function tryDeleteEmptyNode(nodeId) {
        if (nodeId === currentTreeData?.id) return false;
        const node = findNodeById(currentTreeData, nodeId);
        if (node && node.text.trim() === "") {
            function removeFromParent(parent, idToRemove) {
                if (parent.children) {
                    const idx = parent.children.findIndex(ch => ch.id === idToRemove);
                    if (idx !== -1) { parent.children.splice(idx, 1); return true; }
                    for (let child of parent.children) if (removeFromParent(child, idToRemove)) return true;
                }
                return false;
            }
            removeFromParent(currentTreeData, nodeId);
            if (selectedNodeId === nodeId) selectedNodeId = currentTreeData.id;
            renderMindMap();
            saveToFirebase();
            return true;
        }
        return false;
    }
    
    // Operasi node
    function addChild(nodeId) {
        const parent = findNodeById(currentTreeData, nodeId);
        if (!parent) return;
        const newNode = { id: generateId(), text: "Baru", children: [] };
        if (!parent.children) parent.children = [];
        parent.children.push(newNode);
        renderMindMap();
        saveToFirebase();
        selectedNodeId = newNode.id;
        highlightSelectedNode();
    }
    
    function addSibling(nodeId) {
        if (nodeId === currentTreeData.id) return; // root tidak punya saudara
        function findParent(root, childId, parent = null) {
            if (root.id === childId) return parent;
            if (root.children) for (let child of root.children) { const found = findParent(child, childId, root); if (found !== undefined) return found; }
            return undefined;
        }
        const parent = findParent(currentTreeData, nodeId);
        if (!parent) return;
        const newNode = { id: generateId(), text: "Baru", children: [] };
        const index = parent.children.findIndex(ch => ch.id === nodeId);
        if (index !== -1) parent.children.splice(index + 1, 0, newNode);
        else parent.children.push(newNode);
        renderMindMap();
        saveToFirebase();
        selectedNodeId = newNode.id;
        highlightSelectedNode();
    }
    
    async function editNodeText(nodeId) {
        const node = findNodeById(currentTreeData, nodeId);
        if (!node) return;
        const newText = prompt("Edit teks node:", node.text);
        if (newText !== null) {
            node.text = newText;
            renderMindMap();
            const deleted = tryDeleteEmptyNode(nodeId);
            if (!deleted) saveToFirebase();
            highlightSelectedNode();
        }
    }
    
    async function saveToFirebase() {
        if (!currentMindmapId || !currentTreeData) return;
        try {
            await updateDoc(doc(db, "mindmaps", currentMindmapId), {
                title: mindmapTitleInput.value.trim(),
                data: currentTreeData,
                updatedAt: serverTimestamp()
            });
        } catch(e) { console.warn(e); }
    }
    
    // ----------------------------- D3 TREE dengan TOMBOL PLUS (Kanan & Bawah) -----------------------------
    function initMindmapSVG() {
        const container = document.getElementById("mindmapCanvas");
        const width = container.clientWidth || 1000;
        const height = container.clientHeight || 550;
        svgElement = d3.select("#treeSvg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("width", "100%")
            .attr("height", "100%");
        svgElement.selectAll("*").remove();
        mainG = svgElement.append("g");
        zoomBehavior = d3.zoom().scaleExtent([0.3, 2.5]).on("zoom", (event) => {
            currentTransform = event.transform;
            mainG.attr("transform", event.transform);
        });
        svgElement.call(zoomBehavior);
        // reset zoom awal
        svgElement.call(zoomBehavior.transform, d3.zoomIdentity.translate(80, 150).scale(0.8));
    }
    
    function getTextWidth(text) {
        const len = text.length;
        return Math.max(90, Math.min(200, len * 7.5 + 24));
    }
    
    function renderMindMap() {
        if (!svgElement || !mainG) initMindmapSVG();
        const container = document.getElementById("mindmapCanvas");
        const width = container.clientWidth || 1000;
        const height = container.clientHeight || 550;
        svgElement.attr("viewBox", `0 0 ${width} ${height}`);
        if (!currentTreeData) return;
        
        const root = d3.hierarchy(currentTreeData, d => d.children);
        const treeLayout = d3.tree().nodeSize([85, 230]).size([height - 110, width - 200]);
        const treeRoot = treeLayout(root);
        
        // Draw links
        const links = treeRoot.links();
        mainG.selectAll(".link-line").remove();
        mainG.selectAll(".link-line")
            .data(links)
            .enter()
            .append("path")
            .attr("class", "link-line")
            .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));
        
        // Node groups
        const nodes = mainG.selectAll(".node-group").data(treeRoot.descendants(), d => d.data.id);
        // Remove existing plus buttons group
        mainG.selectAll(".plus-buttons-group").remove();
        
        const nodeEnter = nodes.enter().append("g")
            .attr("class", "node-group")
            .attr("transform", d => `translate(${d.y},${d.x})`)
            .attr("data-id", d => d.data.id)
            .on("click", function(event, d) {
                event.stopPropagation();
                selectedNodeId = d.data.id;
                renderMindMap(); // re-render untuk menampilkan tombol plus
            })
            .on("dblclick", function(event, d) {
                event.stopPropagation();
                editNodeText(d.data.id);
            });
        
        // Tambahkan rect untuk setiap node
        nodeEnter.each(function(d) {
            const group = d3.select(this);
            const text = d.data.text;
            const rectW = getTextWidth(text);
            const rectH = 48;
            group.append("rect")
                .attr("x", -rectW/2)
                .attr("y", -rectH/2)
                .attr("width", rectW)
                .attr("height", rectH)
                .attr("class", "node-rect")
                .attr("rx", 12);
            group.append("text")
                .attr("class", "node-text")
                .attr("dy", 4)
                .text(text.length > 28 ? text.slice(0,25)+"..." : text);
        });
        
        // Update existing nodes (teks berubah)
        nodes.select("rect")
            .attr("width", function(d) { return getTextWidth(d.data.text); })
            .attr("height", 48)
            .attr("class", d => d.data.id === selectedNodeId ? "node-rect node-rect-active" : "node-rect");
        nodes.select("text")
            .text(d => d.data.text.length > 28 ? d.data.text.slice(0,25)+"..." : d.data.text);
        nodes.attr("transform", d => `translate(${d.y},${d.x})`);
        nodes.exit().remove();
        
        // ========== TOMBOL PLUS untuk node yang terpilih ==========
        if (selectedNodeId) {
            const selectedHierarchy = treeRoot.descendants().find(d => d.data.id === selectedNodeId);
            if (selectedHierarchy) {
                const nodeX = selectedHierarchy.y;
                const nodeY = selectedHierarchy.x;
                const nodeRectW = getTextWidth(selectedHierarchy.data.text);
                const rectHalfW = nodeRectW / 2;
                const rectH = 48;
                // Tombol kanan (tambah anak) : posisi di kanan kotak
                const rightBtnX = nodeX + rectHalfW + 18;
                const rightBtnY = nodeY;
                // Tombol bawah (tambah saudara) : posisi di bawah kotak (hanya jika bukan root)
                const bottomBtnX = nodeX;
                const bottomBtnY = nodeY + rectH/2 + 18;
                
                const plusGroup = mainG.append("g").attr("class", "plus-buttons-group");
                // Tombol Kanan: Tambah Anak
                const rightCircle = plusGroup.append("circle")
                    .attr("cx", rightBtnX)
                    .attr("cy", rightBtnY)
                    .attr("r", 18)
                    .attr("fill", "#10b981")
                    .attr("stroke", "#fff")
                    .attr("stroke-width", 2)
                    .attr("class", "action-btn")
                    .style("cursor", "pointer")
                    .style("filter", "drop-shadow(0 2px 4px rgba(0,0,0,0.2))")
                    .on("click", (event) => {
                        event.stopPropagation();
                        addChild(selectedNodeId);
                    });
                plusGroup.append("text")
                    .attr("x", rightBtnX)
                    .attr("y", rightBtnY)
                    .attr("dy", "0.35em")
                    .attr("text-anchor", "middle")
                    .attr("fill", "white")
                    .attr("font-size", "16")
                    .attr("font-weight", "bold")
                    .style("pointer-events", "none")
                    .text("+");
                
                // Tombol Bawah: Tambah Saudara (hanya jika bukan root)
                if (selectedNodeId !== currentTreeData.id) {
                    const bottomCircle = plusGroup.append("circle")
                        .attr("cx", bottomBtnX)
                        .attr("cy", bottomBtnY)
                        .attr("r", 18)
                        .attr("fill", "#f59e0b")
                        .attr("stroke", "#fff")
                        .attr("stroke-width", 2)
                        .attr("class", "action-btn")
                        .style("cursor", "pointer")
                        .style("filter", "drop-shadow(0 2px 4px rgba(0,0,0,0.2))")
                        .on("click", (event) => {
                            event.stopPropagation();
                            addSibling(selectedNodeId);
                        });
                    plusGroup.append("text")
                        .attr("x", bottomBtnX)
                        .attr("y", bottomBtnY)
                        .attr("dy", "0.35em")
                        .attr("text-anchor", "middle")
                        .attr("fill", "white")
                        .attr("font-size", "16")
                        .attr("font-weight", "bold")
                        .style("pointer-events", "none")
                        .text("↧");
                } else {
                    // opsional tambah tooltip
                }
            }
        }
        // Jika ada zoom transform yang tersimpan, terapkan
        if (currentTransform && zoomBehavior) {
            svgElement.call(zoomBehavior.transform, currentTransform);
        }
    }
    
    function highlightSelectedNode() {
        renderMindMap();
    }
    
    // Keyboard handling (Tab & Enter)
    function onKeyDownGlobal(event) {
        if (mindmapView.classList.contains("hidden")) return;
        if (!selectedNodeId || !currentTreeData) return;
        if (event.key === "Tab") {
            event.preventDefault();
            addChild(selectedNodeId);
        } else if (event.key === "Enter") {
            event.preventDefault();
            addSibling(selectedNodeId);
        }
    }
    
    // ----------------------------- DASHBOARD CRUD -----------------------------
    async function loadDashboard() {
        dashboardView.classList.remove("hidden");
        mindmapView.classList.add("hidden");
        backBtn.classList.add("hidden");
        cardsContainer.innerHTML = `<div class="col-span-full text-center py-12"><i class="fas fa-spinner fa-pulse"></i> Memuat peta pikiran...</div>`;
        try {
            const snap = await getDocs(mindmapsCollection);
            const cards = [];
            snap.forEach(docSnap => cards.push({ id: docSnap.id, ...docSnap.data() }));
            if (cards.length === 0) {
                cardsContainer.innerHTML = `<div class="col-span-full text-center py-12 bg-white/40 rounded-2xl"><i class="fas fa-folder-open text-5xl text-slate-300 mb-2"></i><p class="text-slate-500">Belum ada mind map. Tekan tombol Card Baru</p></div>`;
                return;
            }
            renderCards(cards);
        } catch(err) {
            cardsContainer.innerHTML = `<div class="col-span-full text-center text-red-500">Gagal: ${err.message}</div>`;
        }
    }
    
    function renderCards(cards) {
        cardsContainer.innerHTML = "";
        cards.forEach(card => {
            const cardDiv = document.createElement("div");
            cardDiv.className = "bg-white rounded-2xl shadow-md border border-slate-200 card-hover cursor-pointer active:scale-95 transition-all";
            cardDiv.innerHTML = `
                <div class="p-4">
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-md text-slate-800 truncate">${escapeHtml(card.title || "Tanpa judul")}</h3>
                        <div class="flex gap-2" onclick="event.stopPropagation()">
                            <button class="edit-card-btn text-indigo-500 p-1" data-id="${card.id}" data-title="${escapeHtml(card.title || '')}"><i class="fas fa-pen"></i></button>
                            <button class="delete-card-btn text-red-500 p-1" data-id="${card.id}"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="text-xs text-slate-400 mt-2 flex items-center gap-1"><i class="fas fa-code-branch"></i> Mind map interaktif</div>
                </div>
            `;
            cardDiv.addEventListener("click", (e) => {
                if (e.target.closest('.edit-card-btn') || e.target.closest('.delete-card-btn')) return;
                openMindmap(card.id, card.title, card.data);
            });
            cardsContainer.appendChild(cardDiv);
            
            cardDiv.querySelector(".edit-card-btn").addEventListener("click", async (e) => {
                e.stopPropagation();
                const id = e.currentTarget.getAttribute("data-id");
                const oldTitle = e.currentTarget.getAttribute("data-title");
                const newTitle = prompt("Edit judul card:", oldTitle);
                if (newTitle && newTitle.trim()) {
                    await updateDoc(doc(db, "mindmaps", id), { title: newTitle.trim() });
                    loadDashboard();
                }
            });
            cardDiv.querySelector(".delete-card-btn").addEventListener("click", async (e) => {
                e.stopPropagation();
                if (confirm("Hapus mind map ini secara permanen?")) {
                    await deleteDoc(doc(db, "mindmaps", card.id));
                    loadDashboard();
                }
            });
        });
    }
    
    async function createNewCard() {
        let title = prompt("Judul mind map baru:", "Mind Map Baru");
        if (!title) title = "Mind Map Baru";
        const newTree = createDefaultTree(title);
        const docRef = await addDoc(mindmapsCollection, {
            title: title,
            data: newTree,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
        });
        await openMindmap(docRef.id, title, newTree);
    }
    
    async function openMindmap(id, title, treeData) {
        currentMindmapId = id;
        let dataTree = treeData;
        if (!dataTree) {
            const docSnap = await getDoc(doc(db, "mindmaps", id));
            if (docSnap.exists()) {
                const data = docSnap.data();
                title = data.title;
                dataTree = data.data;
            } else { alert("Data tidak ditemukan"); return; }
        }
        if (!dataTree || !dataTree.id) dataTree = createDefaultTree(title);
        currentTreeData = JSON.parse(JSON.stringify(dataTree));
        mindmapTitleInput.value = title;
        selectedNodeId = currentTreeData.id;
        dashboardView.classList.add("hidden");
        mindmapView.classList.remove("hidden");
        backBtn.classList.remove("hidden");
        initMindmapSVG();
        renderMindMap();
    }
    
    async function updateMindmapTitle() {
        const newTitle = mindmapTitleInput.value.trim();
        if (newTitle && currentMindmapId) {
            await updateDoc(doc(db, "mindmaps", currentMindmapId), { title: newTitle });
            alert("Judul tersimpan!");
        } else if (!newTitle) alert("Judul tidak boleh kosong");
    }
    
    function backToDashboard() {
        dashboardView.classList.remove("hidden");
        mindmapView.classList.add("hidden");
        backBtn.classList.add("hidden");
        currentMindmapId = null;
        currentTreeData = null;
        selectedNodeId = null;
        loadDashboard();
    }
    
    function logout() { sessionStorage.removeItem("mindmap_auth"); location.reload(); }
    
    function checkAuth() {
        if (!loggedIn) {
            const pwd = prompt("🔐 Masukkan password:", "");
            if (pwd === PASSWORD) {
                sessionStorage.setItem("mindmap_auth", "true");
                loggedIn = true;
                loadDashboard();
            } else {
                alert("Password salah!");
                document.body.innerHTML = "<div class='h-screen flex items-center justify-center'><div class='text-center p-6'><i class='fas fa-lock text-5xl text-red-400'></i><h2 class='text-xl font-bold mt-2'>Akses Ditolak</h2></div></div>";
            }
        } else { loadDashboard(); }
    }
    
    // Event listeners
    window.addEventListener("keydown", onKeyDownGlobal);
    window.addEventListener("resize", () => {
        if (!mindmapView.classList.contains("hidden") && currentTreeData) {
            initMindmapSVG();
            renderMindMap();
        }
    });
    addCardBtn.addEventListener("click", createNewCard);
    backBtn.addEventListener("click", backToDashboard);
    logoutBtn.addEventListener("click", logout);
    saveTitleBtn.addEventListener("click", updateMindmapTitle);
    
    checkAuth();
</script>
</body>
</html>
